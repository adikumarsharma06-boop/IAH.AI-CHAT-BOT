<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gilded Gold Gradient definitions -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="30%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#fef08a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Cosmic Master Plate Background -->
  <rect width="512" height="512" rx="100" fill="url(#darkBg)" stroke="#1e293b" stroke-width="6" />

  <!-- Outer Interstellar Orbit Circles -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#gold)" stroke-width="2" stroke-dasharray="10, 15" opacity="0.45" />
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.30" />
  
  <!-- Outer Orbit Segment -->
  <path d="M 256 71 A 185 185 0 0 1 441 256" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)" />
  <path d="M 256 441 A 185 185 0 0 1 71 256" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" filter="url(#goldGlow)" opacity="0.8" />

  <!-- The Core Shield -->
  <g transform="translate(196, 171)" filter="url(#goldGlow)">
    <!-- Shield / Core Base Path -->
    <path d="M 60 0 L 120 25 C 120 100 60 140 60 150 C 60 140 0 100 0 25 Z" fill="#030712" stroke="url(#gold)" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Central CPU Core Microchip -->
    <rect x="35" y="40" width="50" height="50" rx="10" fill="url(#gold)" stroke="#78350f" stroke-width="2" />
    
    <!-- Processor grid connections -->
    <line x1="60" y1="20" x2="60" y2="40" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" />
    <line x1="60" y1="90" x2="60" y2="120" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" />
    <line x1="20" y1="65" x2="35" y2="65" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" />
    <line x1="100" y1="65" x2="85" y2="65" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" />

    <!-- Mini branding letter marks -->
    <text x="60" y="71" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="#030712" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">
      IAH
    </text>
  </g>

  <!-- Crown on Top for Gold Operator feeling -->
  <path d="M 226 125 L 236 142 L 256 128 L 276 142 L 286 125 L 272 153 L 240 153 Z" fill="url(#gold)" filter="url(#goldGlow)" />
  <circle cx="226" cy="122" r="3" fill="#fbbf24" />
  <circle cx="256" cy="125" r="3" fill="#fbbf24" />
  <circle cx="286" cy="122" r="3" fill="#fbbf24" />

  <!-- Brand Typography -->
  <text x="256" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="950" fill="url(#gold)" text-anchor="middle" letter-spacing="8" filter="url(#goldGlow)">
    IAH.AI
  </text>
  <text x="256" y="415" font-family="monospace" font-size="12" font-weight="800" fill="#f59e0b" opacity="0.8" text-anchor="middle" letter-spacing="3">
    GOLD SECURE OPERATOR
  </text>
</svg>
